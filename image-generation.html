<body>

<!-- BACKGROUND -->

<div class="bg-grid"></div>

<div class="glow glow1"></div>

   <div class="logo">

</div>

    </div>

    <!-- NAVIGATION -->

    <nav>

        <a href="index.html">

<a href="ai-tools.html">

        <a href="services.html">

        <a href="about.html">

        <a href="contact.html">

========================= -->

        <h1>

            AI IMAGE<br>

        <div class="tags">

    <div class="hero-right">

        id="imageGrid">
